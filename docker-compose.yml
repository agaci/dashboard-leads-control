services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yourbox-leads
    restart: unless-stopped
    ports:
      - "3006:3006"
    env_file:
      - .env.local
    networks:
      - yourbox-network

  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://evolution-api:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme}
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://yourbox-leads:3006/api/whatsapp/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - DEL_INSTANCE=false
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - yourbox-network

volumes:
  evolution_instances:
  evolution_store:

networks:
  yourbox-network:
    external: true
