<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Step 1 - Login / Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #000;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .mockup-container {
            width: 900px;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border: 1px solid rgba(190, 214, 47, 0.3);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .mockup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px 12px 0 0;
        }

        .mockup-dots {
            display: flex;
            gap: 8px;
        }

        .mockup-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

        .mockup-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
        }

        .mockup-content {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            border-radius: 0 0 12px 12px;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Waves Background */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            opacity: 0.15;
        }

        .wave path {
            fill: #bed62f;
        }

        /* Car Animation */
        .car {
            position: absolute;
            bottom: 100px;
            right: 100px;
            font-size: 60px;
            animation: drive 3s ease-in-out infinite alternate;
        }

        @keyframes drive {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(-50px) rotate(-5deg); }
        }

        /* Login Box */
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 380px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .logo span {
            color: #bed62f;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register {
            background: #bed62f;
            color: #1a1a1a;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(190, 214, 47, 0.3);
        }

        .btn-login {
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #e0e0e0;
        }

        .btn-login:hover {
            border-color: #bed62f;
            background: rgba(190, 214, 47, 0.1);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #bed62f;
        }

        .forgot {
            font-size: 12px;
            color: #999;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

        .forgot:hover {
            color: #bed62f;
        }
    </style>
</head>
<body>
    <div class="mockup-container">
        <div class="mockup-header">
            <div class="mockup-dots">
                <div class="mockup-dot"></div>
                <div class="mockup-dot"></div>
                <div class="mockup-dot"></div>
            </div>
            <div class="mockup-title">Acesso à Plataforma</div>
        </div>
        <div class="mockup-content">
            <!-- Waves SVG -->
            <svg class="wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,128C960,128,1056,192,1152,197.3C1248,203,1344,149,1392,122.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
            </svg>

            <!-- Car -->
            <div class="car">🚗</div>

            <!-- Login Box -->
            <div class="login-box">
                <div class="logo">Your<span>box</span></div>
                <div class="subtitle">Estafetas & Entregas</div>
                
                <div class="login-btn">
                    <button class="btn btn-register">
                        📝 CRIAR NOVO UTILIZADOR
                    </button>
                    <button class="btn btn-login">
                        🔐 CONECTE-SE
                    </button>
                </div>

                <div class="input-group">
                    <label>📧 Endereço de email</label>
                    <input type="email" placeholder="seu@email.com">
                </div>

                <div class="input-group">
                    <label>🔒 Palavra Chave</label>
                    <input type="password" placeholder="••••••••">
                </div>

                <button class="btn btn-login" style="width: 100%; margin-top: 10px;">
                    AUTENTICAR
                </button>

                <a href="#" class="forgot">Não sei entrar na password?</a>
            </div>
        </div>
    </div>
</body>
</html>
