<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Step 5 - Tracking GPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #000;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .mockup-container {
            width: 900px;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border: 1px solid rgba(190, 214, 47, 0.3);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .mockup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px 12px 0 0;
        }

        .mockup-dots {
            display: flex;
            gap: 8px;
        }

        .mockup-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

        .mockup-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
        }

        .mockup-content {
            background: #37474F;
            border-radius: 0 0 12px 12px;
            min-height: 500px;
            display: grid;
            grid-template-columns: 220px 1fr;
        }

        /* Sidebar */
        .sidebar {
            background: #263238;
            padding: 20px 15px;
            border-radius: 0 0 0 12px;
            overflow-y: auto;
        }

        .driver-card {
            background: #37474F;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .driver-card:hover {
            border-color: #bed62f;
            transform: translateX(5px);
        }

        .driver-card.active {
            background: #455A64;
            border-color: #bed62f;
        }

        .driver-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .driver-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00BCD4, #2196F3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 16px;
            flex-shrink: 0;
        }

        .driver-info {
            flex: 1;
        }

        .driver-name {
            font-size: 14px;
            font-weight: 700;
            color: white;
            margin-bottom: 3px;
        }

        .driver-status {
            font-size: 11px;
            font-weight: 600;
        }

        .status-active {
            color: #4CAF50;
        }

        .status-pause {
            color: #FF9800;
        }

        .driver-time {
            font-size: 11px;
            color: #78909C;
        }

        /* Map Area */
        .map-area {
            position: relative;
            background: linear-gradient(135deg, #E0E0E0 0%, #F5F5F5 50%, #E8E8E8 100%);
            border-radius: 0 0 12px 0;
            overflow: hidden;
        }

        /* Map Grid */
        .map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 40px),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 40px);
        }

        /* Streets */
        .street {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .street-h {
            height: 4px;
            width: 100%;
        }

        .street-v {
            width: 4px;
            height: 100%;
        }

        .street1 { top: 30%; }
        .street2 { top: 60%; }
        .street3 { left: 40%; }
        .street4 { left: 70%; }

        /* Buildings */
        .building {
            position: absolute;
            background: rgba(158, 158, 158, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        .building1 { width: 80px; height: 60px; top: 15%; left: 10%; }
        .building2 { width: 60px; height: 80px; top: 35%; left: 15%; }
        .building3 { width: 90px; height: 70px; top: 15%; left: 50%; }
        .building4 { width: 70px; height: 90px; top: 10%; right: 15%; }
        .building5 { width: 65px; height: 55px; bottom: 20%; left: 20%; }
        .building6 { width: 85px; height: 75px; bottom: 15%; right: 20%; }

        /* Green Spaces */
        .park {
            position: absolute;
            background: rgba(139, 195, 74, 0.3);
            border-radius: 8px;
        }

        .park1 { width: 100px; height: 80px; top: 65%; left: 45%; }
        .park2 { width: 70px; height: 60px; bottom: 10%; left: 50%; }

        /* Delivery Points */
        .delivery-point {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #FF5722;
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 14px;
            z-index: 5;
        }

        .delivery-point span {
            transform: rotate(45deg);
        }

        .point-a {
            top: 25%;
            left: 25%;
            background: #4CAF50;
        }

        .point-b {
            top: 50%;
            left: 55%;
            background: #2196F3;
        }

        /* Drivers on Map */
        .driver-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border: 3px solid #00BCD4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.4);
            z-index: 10;
            animation: driverPulse 2s infinite;
        }

        @keyframes driverPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 4px 12px rgba(0, 188, 212, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 6px 20px rgba(0, 188, 212, 0.6);
            }
        }

        .driver1 {
            top: 20%;
            left: 30%;
        }

        .driver2 {
            top: 45%;
            left: 60%;
            border-color: #4CAF50;
            animation-delay: 0.5s;
        }

        .driver3 {
            top: 65%;
            left: 35%;
            border-color: #9C27B0;
            animation-delay: 1s;
        }

        .driver4 {
            top: 55%;
            right: 20%;
            border-color: #FF9800;
            animation-delay: 1.5s;
        }

        /* Routes */
        .route {
            position: absolute;
            height: 3px;
            background: #bed62f;
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(190, 214, 47, 0.4);
            z-index: 3;
        }

        .route1 {
            top: 25%;
            left: 25%;
            width: 30%;
            transform: rotate(15deg);
        }

        .route2 {
            top: 48%;
            left: 54%;
            width: 20%;
            transform: rotate(-10deg);
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            min-width: 200px;
            z-index: 20;
        }

        .info-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 900;
            color: #1a1a1a;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="mockup-container">
        <div class="mockup-header">
            <div class="mockup-dots">
                <div class="mockup-dot"></div>
                <div class="mockup-dot"></div>
                <div class="mockup-dot"></div>
            </div>
            <div class="mockup-title">Tracking GPS</div>
        </div>
        <div class="mockup-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="driver-card active">
                    <div class="driver-header">
                        <div class="driver-avatar" style="background: linear-gradient(135deg, #00BCD4, #2196F3);">D1</div>
                        <div class="driver-info">
                            <div class="driver-name">Driver A</div>
                            <div class="driver-status status-active">ATIVO • 7m</div>
                        </div>
                    </div>
                </div>

                <div class="driver-card">
                    <div class="driver-header">
                        <div class="driver-avatar" style="background: linear-gradient(135deg, #4CAF50, #8BC34A);">D2</div>
                        <div class="driver-info">
                            <div class="driver-name">Driver B</div>
                            <div class="driver-status status-active">ATIVO • 12m</div>
                        </div>
                    </div>
                </div>

                <div class="driver-card">
                    <div class="driver-header">
                        <div class="driver-avatar" style="background: linear-gradient(135deg, #9C27B0, #E91E63);">D3</div>
                        <div class="driver-info">
                            <div class="driver-name">Driver C</div>
                            <div class="driver-status status-active">ATIVO • 3m</div>
                        </div>
                    </div>
                </div>

                <div class="driver-card">
                    <div class="driver-header">
                        <div class="driver-avatar" style="background: linear-gradient(135deg, #FF9800, #FF5722);">D4</div>
                        <div class="driver-info">
                            <div class="driver-name">Driver D</div>
                            <div class="driver-status status-pause">PAUSA • 25m</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Map Area -->
            <div class="map-area">
                <div class="map-grid"></div>
                
                <!-- Streets -->
                <div class="street street-h street1"></div>
                <div class="street street-h street2"></div>
                <div class="street street-v street3"></div>
                <div class="street street-v street4"></div>
                
                <!-- Buildings -->
                <div class="building building1"></div>
                <div class="building building2"></div>
                <div class="building building3"></div>
                <div class="building building4"></div>
                <div class="building building5"></div>
                <div class="building building6"></div>
                
                <!-- Parks -->
                <div class="park park1"></div>
                <div class="park park2"></div>
                
                <!-- Routes -->
                <div class="route route1"></div>
                <div class="route route2"></div>
                
                <!-- Delivery Points -->
                <div class="delivery-point point-a"><span>📍</span></div>
                <div class="delivery-point point-b"><span>📍</span></div>
                
                <!-- Drivers -->
                <div class="driver-marker driver1">🚗</div>
                <div class="driver-marker driver2">🏍️</div>
                <div class="driver-marker driver3">🚚</div>
                <div class="driver-marker driver4">🚗</div>

                <!-- Info Panel -->
                <div class="info-panel">
                    <div class="info-title">📊 ESTATÍSTICAS</div>
                    <div class="info-stats">
                        <div class="stat">
                            <div class="stat-value">4</div>
                            <div class="stat-label">Ativos</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">12</div>
                            <div class="stat-label">Entregas</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">3.2</div>
                            <div class="stat-label">Avg km</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
