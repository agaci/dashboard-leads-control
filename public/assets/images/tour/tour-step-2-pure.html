<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Step 2 - Criar Novo Serviço</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #000;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .mockup-container {
            width: 900px;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border: 1px solid rgba(190, 214, 47, 0.3);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .mockup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px 12px 0 0;
        }

        .mockup-dots {
            display: flex;
            gap: 8px;
        }

        .mockup-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

        .mockup-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
        }

        .mockup-content {
            background: #37474F;
            border-radius: 0 0 12px 12px;
            min-height: 500px;
            display: grid;
            grid-template-columns: 320px 1fr;
        }

        /* Sidebar */
        .sidebar {
            background: #263238;
            padding: 20px;
            border-radius: 0 0 0 12px;
        }

        .service-header {
            background: #FF9800;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .point-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .point-item {
            background: #37474F;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .point-letter {
            width: 36px;
            height: 36px;
            background: #bed62f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .point-info {
            flex: 1;
        }

        .point-label {
            font-size: 11px;
            color: #78909C;
            margin-bottom: 3px;
        }

        .point-address {
            font-size: 13px;
            color: white;
            font-weight: 600;
        }

        .point-menu {
            color: #78909C;
            cursor: pointer;
            font-size: 18px;
        }

        .time-info {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #B0BEC5;
            margin-bottom: 5px;
        }

        .time-row strong {
            color: white;
        }

        .price-box {
            background: #bed62f;
            color: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .price-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .price-value {
            font-size: 24px;
            font-weight: 900;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .btn-icon {
            flex: 1;
            background: #455A64;
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: #546E7A;
            transform: translateY(-2px);
        }

        /* Map Area */
        .map-area {
            position: relative;
            background: linear-gradient(135deg, #B2DFDB 0%, #80CBC4 100%);
            border-radius: 0 0 12px 0;
            overflow: hidden;
        }

        /* Map Grid */
        .map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Route Line */
        .route-line {
            position: absolute;
            top: 30%;
            left: 15%;
            width: 70%;
            height: 3px;
            background: #bed62f;
            border-radius: 2px;
            box-shadow: 0 2px 10px rgba(190, 214, 47, 0.5);
        }

        /* Map Markers */
        .map-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #FF5722;
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 14px;
        }

        .map-marker span {
            transform: rotate(45deg);
        }

        .marker-a {
            top: 25%;
            left: 12%;
        }

        .marker-b {
            top: 50%;
            left: 45%;
            background: #4CAF50;
        }

        .marker-c {
            top: 35%;
            right: 15%;
            background: #2196F3;
        }

        /* Buildings */
        .building {
            position: absolute;
            background: rgba(255,255,255,0.4);
            border-radius: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .building1 { width: 60px; height: 80px; top: 60%; left: 20%; }
        .building2 { width: 50px; height: 60px; top: 15%; left: 40%; }
        .building3 { width: 70px; height: 90px; bottom: 15%; right: 25%; }
        .building4 { width: 45px; height: 55px; top: 70%; right: 10%; }

        /* Parks */
        .park {
            position: absolute;
            background: rgba(76, 175, 80, 0.3);
            border-radius: 8px;
        }

        .park1 { width: 80px; height: 60px; bottom: 20%; left: 35%; }
        .park2 { width: 60px; height: 50px; top: 10%; right: 30%; }
    </style>
</head>
<body>
    <div class="mockup-container">
        <div class="mockup-header">
            <div class="mockup-dots">
                <div class="mockup-dot"></div>
                <div class="mockup-dot"></div>
                <div class="mockup-dot"></div>
            </div>
            <div class="mockup-title">Criar Novo Serviço</div>
        </div>
        <div class="mockup-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="service-header">
                    📝 Novo serviço
                </div>

                <div class="point-list">
                    <div class="point-item">
                        <div class="point-letter">A</div>
                        <div class="point-info">
                            <div class="point-label">Origem</div>
                            <div class="point-address">Lisboa, Av. Liberdade</div>
                        </div>
                        <div class="point-menu">⋮</div>
                    </div>

                    <div class="point-item">
                        <div class="point-letter">B</div>
                        <div class="point-info">
                            <div class="point-label">Passagem</div>
                            <div class="point-address">Cascais, Centro</div>
                        </div>
                        <div class="point-menu">⋮</div>
                    </div>

                    <div class="point-item">
                        <div class="point-letter">C</div>
                        <div class="point-info">
                            <div class="point-label">Destino</div>
                            <div class="point-address">Sintra, Palácio</div>
                        </div>
                        <div class="point-menu">⋮</div>
                    </div>
                </div>

                <div class="time-info">
                    <div class="time-row">
                        <span>⏱️ Tempo Estimado:</span>
                        <strong>45 min</strong>
                    </div>
                    <div class="time-row">
                        <span>📏 Distância:</span>
                        <strong>32.5 km</strong>
                    </div>
                </div>

                <div class="price-box">
                    <div class="price-label">TARIFA ESTIMADA</div>
                    <div class="price-value">€ 22.50</div>
                </div>

                <div class="action-buttons">
                    <button class="btn-icon">👤</button>
                    <button class="btn-icon">🎯</button>
                    <button class="btn-icon">🔄</button>
                    <button class="btn-icon">✔</button>
                </div>
            </div>

            <!-- Map Area -->
            <div class="map-area">
                <div class="map-grid"></div>
                
                <!-- Route -->
                <div class="route-line"></div>
                
                <!-- Markers -->
                <div class="map-marker marker-a"><span>A</span></div>
                <div class="map-marker marker-b"><span>B</span></div>
                <div class="map-marker marker-c"><span>C</span></div>
                
                <!-- Buildings -->
                <div class="building building1"></div>
                <div class="building building2"></div>
                <div class="building building3"></div>
                <div class="building building4"></div>
                
                <!-- Parks -->
                <div class="park park1"></div>
                <div class="park park2"></div>
            </div>
        </div>
    </div>
</body>
</html>
