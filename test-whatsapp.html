<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Simulador WhatsApp Bot — YourBox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #111b21; color: #e9edef; height: 100vh; display: flex; flex-direction: column; }

    /* Toolbar */
    .toolbar {
      background: #202c33;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      border-bottom: 1px solid #2a3942;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: 0.78rem; color: #8696a0; white-space: nowrap; }
    .toolbar input, .toolbar select {
      background: #2a3942; border: 1px solid #3b4a54; border-radius: 6px;
      color: #e9edef; padding: 0.35rem 0.6rem; font-size: 0.82rem; outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: #00a884; }
    #phoneInput { width: 160px; }
    #apiInput   { width: 240px; }
    .btn-reset {
      background: #e53935; border: none; color: #fff;
      padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; white-space: nowrap;
    }
    .btn-reset:hover { background: #c62828; }
    .tag {
      background: #00a884; color: #fff; font-size: 0.72rem;
      font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 20px;
      white-space: nowrap;
    }
    .tag.offline { background: #e53935; }

    /* Chat area */
    #messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      background: #0b141a;
    }

    .msg { display: flex; max-width: 72%; }
    .msg.lead { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 0.55rem 0.9rem; border-radius: 10px;
      font-size: 0.88rem; line-height: 1.5; white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.lead .bubble { background: #005c4b; border-radius: 10px 2px 10px 10px; }
    .msg.bot  .bubble { background: #202c33; border-radius: 2px 10px 10px 10px; }

    .meta {
      font-size: 0.68rem; color: #8696a0; margin-top: 0.2rem;
      text-align: right; padding: 0 0.3rem;
    }
    .msg.bot .meta { text-align: left; }

    .step-badge {
      align-self: center; background: #2a3942; color: #8696a0;
      font-size: 0.7rem; padding: 0.2rem 0.8rem; border-radius: 20px;
      font-weight: 600; letter-spacing: 0.04em;
    }

    /* Quick replies */
    #quickReplies {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      padding: 0.5rem 1rem; background: #111b21;
      border-top: 1px solid #2a3942; min-height: 44px;
    }
    .qr {
      background: #2a3942; border: 1px solid #3b4a54; color: #e9edef;
      padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer;
      font-size: 0.8rem; font-family: inherit; transition: background 0.15s;
    }
    .qr:hover { background: #3b4a54; }

    /* Input bar */
    .input-bar {
      background: #202c33; padding: 0.6rem 1rem;
      display: flex; gap: 0.5rem; align-items: center;
      border-top: 1px solid #2a3942;
    }
    #msgInput {
      flex: 1; background: #2a3942; border: none; border-radius: 22px;
      padding: 0.6rem 1rem; color: #e9edef; font-family: inherit;
      font-size: 0.9rem; outline: none;
    }
    #msgInput::placeholder { color: #8696a0; }
    #sendBtn {
      background: #00a884; border: none; border-radius: 50%;
      width: 42px; height: 42px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.15s;
    }
    #sendBtn:hover { background: #00917a; }
    #sendBtn:disabled { background: #3b4a54; cursor: default; }
    #sendBtn svg { width: 18px; height: 18px; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 0.4rem 0.2rem; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #8696a0;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  </style>
</head>
<body>

<div class="toolbar">
  <div>
    <label>Nº Fake (telemóvel)</label><br>
    <input id="phoneInput" type="text" value="351900000001" spellcheck="false">
  </div>
  <div>
    <label>API Base URL</label><br>
    <input id="apiInput" type="text" value="https://leads.comgo.pt" spellcheck="false">
  </div>
  <button class="btn-reset" onclick="resetConv()">Reiniciar conversa</button>
  <span class="tag" id="statusTag">A ligar...</span>
  <span style="font-size:0.75rem;color:#8696a0;margin-left:auto">Step: <b id="stepLabel">—</b></span>
</div>

<div id="messages"></div>
<div id="quickReplies"></div>

<div class="input-bar">
  <input id="msgInput" placeholder="Escreva uma mensagem..." autocomplete="off">
  <button id="sendBtn" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function () {
  var msgs = document.getElementById('messages');
  var qrs  = document.getElementById('quickReplies');
  var inp  = document.getElementById('msgInput');
  var btn  = document.getElementById('sendBtn');

  function api()   { return document.getElementById('apiInput').value.replace(/\/$/, ''); }
  function phone() { return document.getElementById('phoneInput').value.trim(); }

  // ── Ping ao servidor ────────────────────────────────────────────────────────
  async function ping() {
    var tag = document.getElementById('statusTag');
    try {
      var r = await fetch(api() + '/api/health', { signal: AbortSignal.timeout(4000) });
      tag.textContent = r.ok ? 'Online' : 'Erro ' + r.status;
      tag.className   = 'tag' + (r.ok ? '' : ' offline');
    } catch {
      // Tentar endpoint alternativo
      try {
        await fetch(api() + '/api/agent/message', { method: 'OPTIONS', signal: AbortSignal.timeout(4000) });
        tag.textContent = 'Online'; tag.className = 'tag';
      } catch {
        tag.textContent = 'Offline'; tag.className = 'tag offline';
      }
    }
    btn.disabled = false;
  }

  // ── Renderizar mensagem ─────────────────────────────────────────────────────
  function addMsg(role, text, step) {
    if (!text) return;
    var w = document.createElement('div');
    w.className = 'msg ' + role;

    // Formatar *negrito* e _itálico_
    var html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*([^*]+)\*/g, '<b>$1</b>')
      .replace(/_([^_]+)_/g, '<i>$1</i>')
      .replace(/~~([^~]+)~~/g, '<s>$1</s>');

    w.innerHTML = '<div class="bubble">' + html + '</div>';

    var meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    w.appendChild(meta);

    msgs.appendChild(w);
    if (step) addStepBadge(step);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addStepBadge(step) {
    document.getElementById('stepLabel').textContent = step;
    var b = document.createElement('div');
    b.className = 'step-badge';
    b.textContent = step;
    msgs.appendChild(b);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    var t = document.createElement('div');
    t.className = 'msg bot'; t.id = 'typing';
    t.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
    return t;
  }

  function setQuickReplies(list) {
    qrs.innerHTML = '';
    (list || []).forEach(function (label) {
      var b = document.createElement('button');
      b.className = 'qr';
      b.textContent = label;
      b.onclick = function () { inp.value = label; sendMessage(); };
      qrs.appendChild(b);
    });
  }

  // ── Enviar mensagem ─────────────────────────────────────────────────────────
  async function sendMessage() {
    var text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    setQuickReplies([]);
    addMsg('lead', text);
    btn.disabled = true;

    var typing = showTyping();

    try {
      var res = await fetch(api() + '/api/agent/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telemovel: phone(), mensagem: text, canal: 'whatsapp' }),
      });
      typing.remove();

      var data = await res.json();
      if (!res.ok) {
        addMsg('bot', '⚠️ Erro ' + res.status + ': ' + (data.error || JSON.stringify(data)));
        btn.disabled = false;
        return;
      }

      addMsg('bot', data.response, data.nextStep);
      setQuickReplies(data.quickReplies);
    } catch (err) {
      typing.remove();
      addMsg('bot', '⚠️ Falha de rede: ' + err.message);
    }
    btn.disabled = false;
    inp.focus();
  }

  // ── Reiniciar conversa ──────────────────────────────────────────────────────
  async function resetConv() {
    // Enviar PSERV para fechar a conversa actual e arrancar nova
    msgs.innerHTML = '';
    qrs.innerHTML  = '';
    document.getElementById('stepLabel').textContent = '—';
    inp.value = 'PSERV';
    await sendMessage();
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  inp.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  ping();
  addMsg('bot', 'Simulador pronto.\n\nClique em *Reiniciar conversa* para enviar PSERV e arrancar o bot, ou escreva qualquer mensagem.');
  btn.disabled = false;

  window.sendMessage  = sendMessage;
  window.resetConv    = resetConv;
})();
</script>
</body>
</html>
